name: Weekly update

# Fetches new/changed pages since last run (independent of backfill status),
# rebuilds only the affected year-books, renders HTML+PDF+EPUB with Quarto,
# publishes PDF/EPUB as GitHub Release assets, and deploys the HTML site to
# GitHub Pages (preserving previously published, untouched books).

on:
  schedule:
    - cron: "0 3 * * 1" # every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rettspraksis-weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc fonts-noto-core

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install Norwegian hyphenation package for xelatex/babel
        run: tlmgr install hyphen-norwegian

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch changed/new pages
        id: fetch
        run: |
          python scripts/fetch_pages.py --mode recentchanges | tee /tmp/fetch.log
          TOUCHED=$(grep '^TOUCHED_JSON=' /tmp/fetch.log | sed 's/^TOUCHED_JSON=//')
          echo "touched=$TOUCHED" >> "$GITHUB_OUTPUT"

      - name: Build touched books
        if: steps.fetch.outputs.touched != '[]'
        run: python scripts/build_books.py --touched-json '${{ steps.fetch.outputs.touched }}'

      - name: Commit source changes
        run: |
          git config user.name "rettspraksis-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/ state/sync_state.json
          if git diff --cached --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "weekly-update: oppdater innhold [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Render touched books
        if: steps.fetch.outputs.touched != '[]'
        run: python scripts/render_books.py --touched-json '${{ steps.fetch.outputs.touched }}'

      - name: Publish GitHub Releases (PDF/EPUB)
        if: steps.fetch.outputs.touched != '[]'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/publish_releases.py --touched-json '${{ steps.fetch.outputs.touched }}'

      - name: Build landing page
        if: steps.fetch.outputs.touched != '[]'
        run: python scripts/build_index.py

      - name: Deploy to GitHub Pages
        if: steps.fetch.outputs.touched != '[]'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site_stage
          keep_files: true
