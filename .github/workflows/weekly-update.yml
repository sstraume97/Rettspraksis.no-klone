name: Weekly update

# Fetches new/changed pages from Rettspraksis.no since last run, commits
# them, then determines *every* book that needs (re)building by diffing
# content/ against state.last_published_ref. That diff — not just this run's
# own recentchanges fetch — is what drives the build: backfill.yml pushes
# newly imported content to main every 6 hours all week without ever
# building or publishing books itself, so this is what sweeps all of that
# up too. Renders HTML+PDF+EPUB with Quarto, publishes PDF/EPUB as GitHub
# Release assets, and deploys the HTML site to GitHub Pages (preserving
# previously published, untouched books via keep_files).

on:
  schedule:
    - cron: "0 3 * * 1" # every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rettspraksis-weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc fonts-noto-core

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install Norwegian hyphenation package for xelatex/babel
        run: tlmgr install hyphen-norwegian

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Read last published ref
        id: prev
        run: |
          PREV=$(python -c "import json; print(json.load(open('state/sync_state.json')).get('last_published_ref') or '')")
          echo "ref=$PREV" >> "$GITHUB_OUTPUT"

      - name: Fetch changed/new pages from Rettspraksis.no
        run: python scripts/fetch_pages.py --mode recentchanges

      - name: Commit fetched content
        run: |
          git config user.name "rettspraksis-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/ state/sync_state.json
          if git diff --cached --quiet; then
            echo "Ingen nye/endrede sider denne uken."
          else
            git commit -m "weekly-update: oppdater innhold [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Determine books to (re)build since last publish
        id: touched
        run: |
          python scripts/diff_touched.py --since "${{ steps.prev.outputs.ref }}" | tee /tmp/touched.log
          TOUCHED=$(grep '^TOUCHED_JSON=' /tmp/touched.log | sed 's/^TOUCHED_JSON=//')
          echo "touched=$TOUCHED" >> "$GITHUB_OUTPUT"

      - name: Build touched books
        if: steps.touched.outputs.touched != '[]'
        run: python scripts/build_books.py --touched-json '${{ steps.touched.outputs.touched }}'

      - name: Commit generated book files
        if: steps.touched.outputs.touched != '[]'
        run: |
          git config user.name "rettspraksis-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "Ingen bok-endringer å committe."
          else
            git commit -m "weekly-update: regenerer bøker [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Render touched books
        if: steps.touched.outputs.touched != '[]'
        run: python scripts/render_books.py --touched-json '${{ steps.touched.outputs.touched }}'

      - name: Publish GitHub Releases (PDF/EPUB)
        if: steps.touched.outputs.touched != '[]'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/publish_releases.py --touched-json '${{ steps.touched.outputs.touched }}'

      - name: Build landing page
        if: steps.touched.outputs.touched != '[]'
        run: python scripts/build_index.py

      - name: Deploy to GitHub Pages
        if: steps.touched.outputs.touched != '[]'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site_stage
          keep_files: true

      - name: Record published ref
        if: steps.touched.outputs.touched != '[]'
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"
          HEAD_SHA=$(git rev-parse HEAD)
          python -c "
          import json
          path = 'state/sync_state.json'
          state = json.load(open(path))
          state['last_published_ref'] = '$HEAD_SHA'
          json.dump(state, open(path, 'w'), indent=2, ensure_ascii=False, sort_keys=True)
          "
          git config user.name "rettspraksis-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/sync_state.json
          git commit -m "weekly-update: registrer publisert ref [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
